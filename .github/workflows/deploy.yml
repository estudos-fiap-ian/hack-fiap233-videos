name: Build & Deploy videos

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
  AWS_REGION: us-east-1
  ECR_REPOSITORY: hack-fiap233-videos
  EKS_CLUSTER_NAME: hack-fiap233-eks
  AWS_ACCOUNT_ID: "092361660280"

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build --platform linux/amd64 \
            -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest \
            -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG \
            .
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Push Docker image to ECR
        run: |
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

      - name: Create/Update DB secret
        run: |
          CREDS=$(aws secretsmanager get-secret-value \
            --secret-id hack-fiap233/videos/db-credentials \
            --region $AWS_REGION \
            --query SecretString --output text)

          kubectl delete secret videos-db-credentials --ignore-not-found
          kubectl create secret generic videos-db-credentials \
            --from-literal=host=$(echo $CREDS | jq -r .host) \
            --from-literal=port=$(echo $CREDS | jq -r .port) \
            --from-literal=dbname=$(echo $CREDS | jq -r .dbname) \
            --from-literal=username=$(echo $CREDS | jq -r .username) \
            --from-literal=password=$(echo $CREDS | jq -r .password)

      - name: Create/Update ConfigMap
        run: |
          SQS_URL="https://sqs.${AWS_REGION}.amazonaws.com/${AWS_ACCOUNT_ID}/hack-fiap233-video-videos"

          kubectl delete configmap videos-config --ignore-not-found
          kubectl create configmap videos-config \
            --from-literal=sqs_queue_url="$SQS_URL" \
            --from-literal=s3_bucket="hack-fiap233-videos-storage"

      - name: Create/Update SMTP secret
        run: |
          kubectl delete secret smtp-credentials --ignore-not-found
          kubectl create secret generic smtp-credentials \
            --from-literal=from="${{ secrets.SMTP_FROM }}" \
            --from-literal=password="${{ secrets.SMTP_PASSWORD }}"

      - name: Deploy to EKS with SHA image
        run: |
          # Aplica recursos k8s (ConfigMap, Secrets, etc.)
          kubectl apply -f k8s/

          # Atualiza deployment com tag do commit
          kubectl set image deployment/videos-deployment \
            videos=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

          # Aguarda rollout completo
          kubectl rollout status deployment/videos-deployment --timeout=120s